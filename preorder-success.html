<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Real G's Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --black: #0a0a0a; --dark: #111111; --dark3: #242424; --grey: #888888; --light-grey: #cccccc; --white: #f5f5f0; --accent: #c8a96e; --font-display: 'Bebas Neue', sans-serif; --font-condensed: 'Barlow Condensed', sans-serif; --font-body: 'Barlow', sans-serif; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.wrap { text-align: center; max-width: 520px; }
.icon { width: 72px; height: 72px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: var(--accent); }
.eyebrow { font-family: var(--font-condensed); font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
h1 { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); line-height: 0.9; margin-bottom: 1.5rem; }
p { color: var(--grey); margin-bottom: 0.75rem; font-size: 0.9rem; line-height: 1.8; }
.btn { display: inline-block; margin-top: 2rem; background: var(--accent); color: var(--black); font-family: var(--font-condensed); font-weight: 600; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.85rem 2.2rem; text-decoration: none; }
.details { background: var(--dark); border: 1px solid var(--dark3); padding: 1.5rem; margin: 2rem 0; text-align: left; }
.details p { font-size: 0.85rem; }
.details strong { color: var(--white); }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <p class="eyebrow">Pre-Order Confirmed</p>
  <h1>YOU'RE IN THE CLUB</h1>
  <div class="details">
    <p><strong>Real G's Golf Cap × 1</strong></p>
    <p style="margin-top:0.5rem">Total charged: <strong id="totalAmount">$39.00 AUD</strong></p>
    <p style="margin-top:0.5rem" id="deliveryNote"></p>
    <p style="margin-top:0.5rem">A confirmation receipt has been sent to your email.</p>
  </div>
  <p id="shippingMsg"></p>
  <p style="margin-top:0.75rem">Follow us on Instagram <a href="https://instagram.com/realgsgolf" style="color:var(--accent)">@realgsgolf</a> for updates.</p>
  <a href="index.html" class="btn">Back to Home</a>
</div>

<script>
// Read order details from localStorage saved before payment
const orders = JSON.parse(localStorage.getItem('rgg_orders') || '[]');
const lastOrder = orders[orders.length - 1];

if (lastOrder) {
  const total = lastOrder.total || 39.00;
  const delivery = lastOrder.delivery || 'postage';

  document.getElementById('totalAmount').textContent = `$${total.toFixed(2)} AUD`;

  if (delivery === 'pickup') {
    document.getElementById('deliveryNote').innerHTML = '<strong>Delivery:</strong> Pick Up — Real G\'s will contact you via email to arrange pick up details.';
    document.getElementById('shippingMsg').textContent = 'Keep an eye on your inbox — we\'ll be in touch shortly to arrange pick up.';
  } else {
    document.getElementById('deliveryNote').innerHTML = '<strong>Delivery:</strong> Australia Post tracked shipping.';
    document.getElementById('shippingMsg').textContent = 'Your cap will be shipped via Australia Post within 3–5 business days. You\'ll receive a tracking number once dispatched.';
  }
} else {
  // Fallback if no order data
  document.getElementById('totalAmount').textContent = 'See your email receipt for amount';
  document.getElementById('shippingMsg').textContent = 'Your cap will be shipped or picked up based on your selected delivery method.';
}
</script>
</body>
</html>
